server:
  port: "9000"
  environment: "development"

database:
  host: "localhost"
  port: "5432"
  user: "postgres"
  password: "postgres"
  name: "kaleidoscope"
  sslmode: "disable"

redis:
  host: "localhost"
  port: "6379"
  password: ""
  db: 0

log:
  enable_console: true
  enable_file: true
  file_path: "logs/app.log"
  max_size: 100
  max_backups: 3
  max_age: 30
  compress: true

cors:
  allow_origins:
    - "*"
  allow_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allow_headers:
    - "Origin"
    - "Content-Type"
    - "Accept"
    - "Authorization"
  allow_credentials: true